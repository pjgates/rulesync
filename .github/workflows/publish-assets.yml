name: Publish Assets

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string
        default: "v8.30.1-omp.1"

permissions:
  contents: write # Required for uploading release assets

jobs:
  build-assets:
    name: Build and upload assets
    runs-on: macos-14
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release/v')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Pin every asset and injected fork commit to the commit that triggered
          # this workflow, never to a moving branch.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          # Fetch tags so the existence check below can see remote tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve resulting commit
        id: resulting-commit
        run: |
          COMMIT="$(git rev-parse 'HEAD^{commit}')"
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Checked-out release commit is not lowercase 40-hex: $COMMIT"
            exit 1
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Configure git
        uses: ./.github/actions/git-config

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v2
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run focused unit tests
        run: >-
          pnpm exec vitest run
          src/version.test.ts
          src/features/rules/omp-rule.test.ts
          src/features/commands/omp-command.test.ts
          src/features/skills/omp-skill.test.ts
          src/features/subagents/omp-subagent.test.ts
          src/features/rules/rules-processor.test.ts
          src/features/commands/commands-processor.test.ts
          src/features/skills/skills-processor.test.ts
          src/features/subagents/subagents-processor.test.ts

      - name: Run focused end-to-end tests
        run: >-
          pnpm exec vitest run --config vitest.e2e.config.ts
          src/e2e/e2e-rules.spec.ts
          src/e2e/e2e-commands.spec.ts
          src/e2e/e2e-skills.spec.ts
          src/e2e/e2e-subagents.spec.ts
          src/e2e/e2e-input-root.spec.ts
          src/e2e/omp-runtime-contract.spec.ts

      - name: Build pinned release assets
        run: pnpm build:release-assets
        env:
          RULESYNC_RELEASE_TAG: v8.30.1-omp.1
          RULESYNC_RESULTING_COMMIT: ${{ steps.resulting-commit.outputs.commit }}

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            TAG="${HEAD_REF#release/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine tag name"
            exit 1
          fi
          if [ "$TAG" != "v8.30.1-omp.1" ]; then
            echo "::error::Release tag must be exactly v8.30.1-omp.1, got: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          TAG_INPUT: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}

      - name: Create and push tag
        run: |
          CURRENT_SHA="$(git rev-parse HEAD)"

          LOCAL_TAG_EXISTS=0
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            LOCAL_TAG_EXISTS=1
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" != "$CURRENT_SHA" ]; then
              echo "::error::Tag $TAG already exists locally but points to $TAG_SHA instead of $CURRENT_SHA"
              exit 1
            fi
          fi

          # Query both peeled (annotated) and plain (lightweight) refs, preferring
          # the peeled form when present so annotated tags resolve to their commit.
          REMOTE_SHA="$(git ls-remote --tags origin "refs/tags/$TAG^{}" "refs/tags/$TAG" \
            | awk '$2 ~ /\^\{\}$/ {peeled=$1} $2 !~ /\^\{\}$/ {plain=$1} END {print (peeled ? peeled : plain)}')"
          if [ -n "$REMOTE_SHA" ]; then
            if [ "$REMOTE_SHA" != "$CURRENT_SHA" ]; then
              echo "::error::Tag $TAG already exists on origin but points to $REMOTE_SHA instead of $CURRENT_SHA"
              exit 1
            fi
            echo "Tag $TAG already exists on origin and points to the current commit, skipping creation"
            exit 0
          fi

          if [ "$LOCAL_TAG_EXISTS" -eq 1 ]; then
            echo "Tag $TAG already exists locally and points to the current commit, pushing to origin"
            git push origin "$TAG"
            echo "Tag $TAG pushed"
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG created and pushed"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Upload assets to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          files: |
            dist-release/rulesync-darwin-arm64
            dist-release/omp-runtime-contract-darwin-arm64
            dist-release/config-schema.json
            dist-release/SHA256SUMS
